roles:
  booz_allen_hamilton:
    company: "Booz Allen Hamilton"
    role: "Senior Product Designer (Design-Engineering)"
    period: "2022-present"
    program: "Federal Trusted Environments platform + Developer Portal"
    clients_domain: ["Army", "DoD", "FAA", "VA"]
    facts:
      - "Construyo 2 design systems sobre Shadcn + Radix + BAH Brand Book."
      - "Trusted Environments arranco Light-only; usuarios prefirieron Dark -> migro a full Dark."
      - "Diseno agent-ready design system (dark): agentes de OTROS equipos lo leen/interpretan para generar assets (social stories, presentaciones PowerPoint) autonomamente. Hecho ANTES de que existiera tooling de cloud design mainstream."
      - "Pionero en agentic UX research: emuladores de persona basados en LLM corrian tests de usabilidad automatizados."
      - "Costo por corrida de persona-emulators: ~$400 en tokens = ~16M tokens/ciclo ($25 = 1M tokens). Cada corrida ~4-5h. Cientos de tests por screenshot."
      - "Output = items accionables. Validacion: pruebas moderadas con 5 usuarios por feature; 92% declararon que las mejoras eran mejores."
      - "Entregaba codigo casi listo (React + animaciones viables, componentes reales de la libreria, pantallas generadas); ingenieria solo conectaba a datos."
      - "Reduccion ciclo design-to-dev: de ~6 semanas (Figma 2-3 sem + implementar 1x1 ~1 mes, 3-4 dias/componente) a <1 semana (casi automatico)."
      - "Adopcion interna: de 0 (dia cero) a 26 equipos dentro de BAH (uso opcional -> adopcion organica). Incluye Vellox Reverser (ciberseguridad): https://www.boozallen.com/expertise/products/vellox-reverser.html"
      - "Compliant con WCAG 2.2 checks. Paso 95%+ de checks automatizados (numero alto creible; dato exacto disponible si lo piden)."
      - "Producto base para que los proyectos de BAH (empresa de ~30,000 ingenieros) arranquen desde un baseline compartido en vez de cero."
      - "Clientes externos pidieron comprar el producto; plan de salida externa."
      - "Equipo: ~50 personas al inicio -> 19 tras recortes. Consulto con >=50% en cada paso, casi todos al final."
      - "Diseno un MCP propio para developers."
      - "Implemento NPS y CSAT para evaluacion con usuarios."
      - "Tras testing IA: tickets de problemas bajaron; tickets de feedback/ideas en Aha! subieron (mas engagement por releases mas rapidos)."
    methods: ["Usability Testing (moderado/no moderado)", "Persona emulation (LLM)", "Journey mapping", "Cognitive friction mapping"]
    accessibility: ["WCAG 2.2", "Section 508"]

