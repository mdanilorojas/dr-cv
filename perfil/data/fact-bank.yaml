    company: "Compliance SaaS · LATAM"
    role: "Co-founder & Lead Product Designer"
    period: "2026-present"
    facts:
      - "Co-fundo SaaS de compliance para PYMES LATAM. Lidero diseno discovery-to-launch."
      - "MVP validado en 40 dias."
      - "Onboarding inicial roto (producto nuevo) -> ~0 conversiones. Tras pruebas + change management + fixes, funnel funcional en 3 semanas (volumen acumulado: sem1 20%, sem2 ~30%, sem3 ~50% del total). NO afirmar como tasa de conversion estable."
      - "Design system de 31 componentes en Figma, usado en 16 pantallas. Algunos pre-construidos para cumplimiento de auditoria IL5 / FedRAMP. [CONFIRMAR: IL5/FedRAMP son frameworks US federales; verificar que aplican a este SaaS LATAM.]"
      - "Implementado directo en React/TypeScript."
      - "~280 usuarios pagando sobre base de ~2,700 usuarios totales."
      - "Loops de feedback con personas IA para validar flujos antes de ingenieria."
    stack: ["Figma", "React 19", "TypeScript", "Supabase"]

