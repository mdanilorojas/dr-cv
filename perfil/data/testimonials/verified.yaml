- quote: "Danilo had one of the deepest understandings of the big-picture system flow on our team, translating complex functionality into sleek, modern designs that were intuitive for the end user. One of the easiest people to work with in my professional life — always enthusiastic, always digging into problems together, and passionate about incorporating AI workflows to work faster and make hand-off easier for the devs. An incredible designer and coworker."
  quoteEs: "Danilo tenía uno de los entendimientos más profundos del flujo sistémico completo en nuestro equipo, traduciendo funcionalidad compleja en diseños modernos y elegantes que eran intuitivos para el usuario final. Una de las personas más fáciles de trabajar con las que me he encontrado en mi vida profesional — siempre entusiasta, siempre dispuesto a resolver problemas juntos, y apasionado por incorporar workflows de IA para trabajar más rápido y hacer los handoff más fáciles para los devs. Un diseñador y compañero de trabajo increíble."
