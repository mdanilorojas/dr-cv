thesis:
  en: "Eighteen years in product, fifteen in design. Senior UX judgment, user psychology mapping, and the system design capability to align complex product architectures into frictionless user experiences — AI-augmented research as leverage."
  es: "Dieciocho años en producto, quince en diseño. Juicio UX senior, mapeo de psicología del usuario y capacidad de diseño de sistemas para alinear arquitecturas de producto complejas en experiencias sin fricción — investigación con IA como leverage."
tagline:
  en: "From DBA to UX — I learned the whole stack to design for it. I analyze, learn, ship, and align to whatever the project needs."
  es: "De DBA a UX — aprendí el stack entero para diseñar sobre él. Analizo, aprendo, entrego y me alineo a lo que el proyecto necesite."
heroLine:
  en: "I design software products for complex, regulated environments."
  es: "Diseño productos de software para entornos complejos y regulados."
heroEmphasis:
  en: "complex, regulated environments."
  es: "entornos complejos y regulados."
heroSub:
  en: "Mapping the coordinates where engineering meets human craft."
  es: "Mapeando las coordenadas donde la ingeniería se encuentra con el craft humano."
