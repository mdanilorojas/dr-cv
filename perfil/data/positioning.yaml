thesis:
  en: "Eighteen years in product, fifteen in design. Senior UX judgment, enterprise-grade compliance documentation, and the flexibility to learn any domain and ship into it — AI as leverage, not costume."
  es: "Dieciocho años en producto, quince en diseño. Juicio UX senior, documentación de compliance enterprise-grade, y la flexibilidad de aprender cualquier dominio y entregar en él — IA como leverage, no como disfraz."
tagline:
  en: "From DBA to UX — I learned the whole stack to design for it. I analyze, learn, ship, and align to whatever the project needs."
  es: "De DBA a UX — aprendí el stack entero para diseñar sobre él. Analizo, aprendo, entrego y me alineo a lo que el proyecto necesite."
heroLine:
  en: "Designing products for complex systems, regulated environments, and teams that need to move faster."
  es: "Diseñando productos para sistemas complejos, entornos regulados y equipos que necesitan moverse más rápido."
