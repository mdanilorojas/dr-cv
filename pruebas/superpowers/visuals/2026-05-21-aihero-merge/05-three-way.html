<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compare · v1 vs v2 vs v3</title>
<link rel="stylesheet" href="tokens-v11.css">
<style>
  body { background: var(--v11-bg-deep); margin: 0; padding: 0; font-family: var(--v11-font-body); color: var(--v11-text); }
  .return-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--v11-bg-deep); padding: 8px 24px;
    border-bottom: 1px solid var(--v11-line);
    font-family: var(--v11-font-display);
    font-size: 11px; color: var(--v11-text-60);
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center;
  }
  .return-bar a { color: var(--v11-accent); }
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--v11-line);
    height: calc(100vh - 32px);
  }
  .pane { background: var(--v11-bg-primary); display: flex; flex-direction: column; min-height: 0; }
  .pane__head {
    padding: 10px 16px;
    background: var(--v11-bg-elevated);
    border-bottom: 1px solid var(--v11-line);
    font-family: var(--v11-font-display);
    font-size: 11px; color: var(--v11-text-70);
    letter-spacing: 0.06em;
    display: flex; align-items: center; justify-content: space-between;
  }
  .pane__head b { color: var(--v11-text); font-weight: 600; }
  .tag {
    padding: 2px 6px; border-radius: 4px;
    font-size: 10px; letter-spacing: 0.08em;
    background: var(--v11-accent); color: var(--v11-accent-ink);
    font-weight: 600;
  }
  iframe { flex: 1; width: 100%; border: 0; }
</style>
</head>
<body>

<div class="return-bar">← <a href="index.html">Back to hub</a> · v1 · v2 · v3 — independent scroll</div>

<div class="compare">
  <section class="pane">
    <div class="pane__head"><span><b>v1</b> · Quiet</span></div>
    <iframe src="v1-quiet.html" title="v1 Quiet"></iframe>
  </section>
  <section class="pane">
    <div class="pane__head"><span><b>v2</b> · Balanced</span><span class="tag">Target</span></div>
    <iframe src="v2-balanced.html" title="v2 Balanced"></iframe>
  </section>
  <section class="pane">
    <div class="pane__head"><span><b>v3</b> · Method-forward</span></div>
    <iframe src="v3-method-forward.html" title="v3 Method-forward"></iframe>
  </section>
</div>

</body>
</html>
