<!-- @dsCard group="Colors" viewport="700x130" name="Viz series + diff tokens" subtitle="Five-series chart palette and the add/del diff pairs" -->
<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--bg);display:flex;gap:24px;align-items:center}
.viz{display:flex;gap:8px}.dot{width:34px;height:34px;border-radius:50%}
.diff{font-family:var(--font-mono);font-size:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:230px}
.add{background:rgba(74,222,128,0.08);color:#4ADE80;padding:4px 12px;box-shadow:inset 2px 0 0 rgba(74,222,128,.25)}
.del{background:rgba(248,113,113,0.08);color:#F87171;padding:4px 12px;box-shadow:inset 2px 0 0 rgba(248,113,113,.25)}</style></head>
<body>
<div class="viz">
<span class="dot" style="background:#FF8964"></span><span class="dot" style="background:#5683DA"></span>
<span class="dot" style="background:#E5A84B"></span><span class="dot" style="background:#4ADE80"></span>
<span class="dot" style="background:#9B8AFB"></span>
</div>
<div class="diff"><div class="add">+ banked_value += 42000</div><div class="del">− gap: stakeholder_craft</div></div>
</body></html>
