<!-- @dsCard group="Colors" viewport="700x150" name="Accent — restrained, no glow" subtitle="Warm orange used as punctuation: fill, soft, ring, line, deep" -->
<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--bg);display:flex;gap:12px;align-items:center}
.sw{width:96px;height:84px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:9px}
.note{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);max-width:160px;line-height:1.5}</style></head>
<body>
<div class="sw" style="background:#FF8964;color:#2A0F05">#FF8964<br>accent</div>
<div class="sw" style="background:#E0674A;color:#2A0F05">#E0674A<br>deep/hover</div>
<div class="sw" style="background:rgba(255,137,100,0.14);color:#FF8964;border:1px solid rgba(255,137,100,0.28)">soft + line</div>
<div class="sw" style="background:transparent;color:#FF8964;border:1px solid rgba(255,137,100,0.35)">ring 35%</div>
<div class="note">Accent appears only as fills, hairline rings, carets and chips. No radial-glow CTA. No gradients.</div>
</body></html>
