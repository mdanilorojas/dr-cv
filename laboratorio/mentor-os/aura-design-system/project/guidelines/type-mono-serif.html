<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--bg);display:grid;grid-template-columns:1fr 1fr;gap:24px}
.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);line-height:2.1}
.mono b{color:var(--accent);font-weight:500}
.serif{font-family:var(--font-serif);font-size:17px;line-height:1.7;color:var(--text-body)}</style></head>
<body>
<div class="mono">// objective<br><b>$250,000 / year</b><br>// diagnostic · prose grader<br>// banked value · market value</div>
<div class="serif"><span style="font-size:2.6em;float:left;line-height:.8;padding:2px 8px 0 0;color:var(--accent-hover);font-weight:700">A</span> notebook thesis, not a résumé — long-form serif for the reading surface only.</div>
</body></html>
