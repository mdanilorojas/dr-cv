<!-- @dsCard group="Colors" viewport="700x140" name="Ink ramp on dark" subtitle="text → text-subtle, eight steps of legible grey" -->
<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--bg);display:flex;gap:8px;flex-wrap:wrap}
.s{flex:1;min-width:70px;display:flex;flex-direction:column;gap:6px;align-items:center}
.c{width:100%;height:40px;border-radius:6px;border:1px solid var(--border)}
.l{font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}</style></head>
<body>
<div class="s"><div class="c" style="background:#F4F4F5"></div><span class="l">text</span></div>
<div class="s"><div class="c" style="background:#D7D8DB"></div><span class="l">body</span></div>
<div class="s"><div class="c" style="background:#B0B2B7"></div><span class="l">70</span></div>
<div class="s"><div class="c" style="background:#95979E"></div><span class="l">60</span></div>
<div class="s"><div class="c" style="background:#797D86"></div><span class="l">50</span></div>
<div class="s"><div class="c" style="background:#61656B"></div><span class="l">40</span></div>
<div class="s"><div class="c" style="background:#4A4B50"></div><span class="l">subtle</span></div>
</body></html>
