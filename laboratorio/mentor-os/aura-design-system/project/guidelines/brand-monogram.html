<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:28px;background:var(--bg);display:flex;gap:32px;align-items:center}
.brand{display:flex;align-items:center;gap:12px}
.bt{font-family:var(--font-sans);font-weight:600;letter-spacing:-.02em;color:var(--text-primary);font-size:18px}
.bg{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.tile{display:grid;place-items:center;background:var(--accent);color:var(--accent-ink);font-family:var(--font-mono);font-weight:700;letter-spacing:-1px;border-radius:14px}</style></head>
<body>
<img src="../assets/dr-monogram.svg" width="64" height="64" alt="">
<div class="tile" style="width:40px;height:40px;font-size:16px;border-radius:9px">DR</div>
<img src="../assets/favicon.svg" width="28" height="28" alt="">
<div class="brand">
  <img src="../assets/dr-monogram.svg" width="32" height="32" alt="">
  <div><div class="bt">Danilo Rojas</div><div class="bg">Career Training OS</div></div>
</div>
</body></html>
