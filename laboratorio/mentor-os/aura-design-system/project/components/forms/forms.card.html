<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Switch, Tabs, Segmented } = window.AuraDesignSystem_58f91b;
function Demo() {
  const [tab,setTab] = React.useState('overview');
  const [seg,setSeg] = React.useState('Dark');
  return (
    <div>
      <div className="grid">
        <Input label="Objective" help="Outcome-first, always." defaultValue="$250,000 / year" />
        <Select label="Skill cluster"><option>Systems thinking</option><option>Prototyping</option></Select>
        <Input search placeholder="Search skills…" />

      <div className="row">
        <Tabs value={tab} onChange={setTab} items={[{id:'overview',label:'Overview'},{id:'gaps',label:'Gaps'},{id:'path',label:'Path'}]} />
        <Segmented value={seg} onChange={setSeg} items={['Dark','Light','Auto']} />
        <Switch defaultChecked />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
