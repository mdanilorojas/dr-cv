<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Training OS — Aura app kit</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>html,body{height:100%}body{margin:0;overflow:hidden}#root{height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppShell.jsx" data-presets="react"></script>
<script type="text/babel" src="DashboardScreen.jsx" data-presets="react"></script>
<script type="text/babel" src="DiagnosticScreen.jsx" data-presets="react"></script>
<script type="text/babel" src="SkillGraphScreen.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const TITLES = { dashboard:'Dashboard', diagnostic:'Diagnostic', graph:'Skill graph', journey:'Learning path', mentor:'AI mentor', projects:'Projects', settings:'Settings' };
function App() {
  const [active, setActive] = React.useState('dashboard');
  const [theme, setTheme] = React.useState('dark');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  const Screen = active === 'diagnostic' ? window.DiagnosticScreen
    : active === 'graph' ? window.SkillGraphScreen
    : window.DashboardScreen;
  return (
    <window.AppShell active={active} onNavigate={setActive}>
      <window.Topbar title={TITLES[active] || 'Dashboard'} theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
      <Screen />
    </window.AppShell>
  );
}
function mount(){ if(window.AppShell && window.DashboardScreen && window.DiagnosticScreen && window.SkillGraphScreen){ ReactDOM.createRoot(document.getElementById('root')).render(<App/>); } else { setTimeout(mount, 40); } }
mount();
</script>
</body>
</html>
